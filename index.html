<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>our tokyo week</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@700&family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root{
    --green:#5797B4;
    --green-dark:#457C97;
    --green-darker:#2C5468;
    --yellow:#EEEA99;
    --red:#B5583F;
    --cream:#FBF6E3;
    --ink:#1C3542;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:var(--green);}
  body{
    font-family:'Inter',sans-serif;
    color:var(--cream);
    -webkit-font-smoothing:antialiased;
  }
  .marker{font-family:'Caveat',cursive;font-weight:700;}
  .mono{font-family:Arial,Helvetica,sans-serif;}

  .wrap{max-width:900px;margin:0 auto;background:var(--green);position:relative;overflow:hidden;}

  /* scalloped wave divider */
  .wave{height:26px;width:100%;
    background-image: radial-gradient(circle at 12px 0px, transparent 13px, var(--cream) 13.5px);
    background-size: 26px 26px;
    background-repeat: repeat-x;
    background-position: top center;
  }
  .wave.flip{transform:rotate(180deg);}
  .wave-green{
    background-image: radial-gradient(circle at 12px 26px, transparent 13px, var(--green) 13.5px);
  }
  .wave-dark{
    background-image: radial-gradient(circle at 12px 26px, transparent 13px, var(--green-dark) 13.5px);
  }

  header{padding:44px 28px 10px;position:relative;}
  .hero-title{
    font-family:'Inter',sans-serif;font-weight:400;
    font-size:clamp(64px, 15vw, 128px);line-height:0.9;color:var(--yellow);letter-spacing:-2px;
    -webkit-text-stroke:1px var(--ink);
    margin:0 0 6px;
    outline:none;white-space:nowrap;
  }
  .hero-sub{
    font-size:15px;color:var(--cream);opacity:0.92;margin:4px 0 18px;
    outline:none;font-family:'Inter',sans-serif;
  }
  .hero-sub b{color:var(--yellow);}
  .countdown-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:6px;}
  .countdown-pill{
    background:var(--cream);color:var(--ink);border-radius:20px;
    padding:6px 14px;font-family:'Inter',sans-serif;font-size:12px;
    display:flex;align-items:center;gap:8px;
  }
  .countdown-pill input[type=date]{border:none;background:transparent;font-family:'Inter',sans-serif;font-size:12px;color:var(--ink);}
  .countdown-num{font-family:'Inter',sans-serif;font-weight:400;font-size:22px;color:var(--red);}

  nav{display:flex;gap:8px;flex-wrap:wrap;padding:20px 28px 22px;}
  .tab{
    font-family:'Inter',sans-serif;
    font-size:13px;letter-spacing:0.3px;
    background:transparent;color:var(--cream);
    border:2px solid var(--cream);border-radius:30px;
    padding:8px 16px;cursor:pointer;
  }
  .tab.active{background:var(--yellow);color:var(--ink);border-color:var(--yellow);}
  .tab .count{opacity:0.65;font-family:'Inter',sans-serif;font-weight:400;margin-left:4px;}

  main{padding:26px 28px 10px;}

  .addbar{
    background:var(--cream);border-radius:16px;padding:16px;margin-bottom:22px;
    color:var(--ink);
  }
  .addbar-title{font-family:'Inter',sans-serif;font-size:13px;margin-bottom:10px;color:var(--green-darker);}
  .addbar-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px;}
  .addbar input, .addbar textarea{
    width:100%;border:1.5px solid var(--green);border-radius:8px;
    padding:8px 10px;font-family:'Inter',sans-serif;font-size:13px;
    background:#fff;color:var(--ink);
  }
  .addbar textarea{grid-column:1/-1;resize:vertical;min-height:44px;}
  .addbar input:focus, .addbar textarea:focus{outline:2px solid var(--red);}
  .addbtn{
    font-family:'Inter',sans-serif;font-size:13px;
    background:var(--red);color:var(--cream);border:none;border-radius:8px;
    padding:10px 18px;cursor:pointer;width:100%;
  }
  .addbtn:active{transform:scale(0.98);}

  .cards{display:flex;flex-direction:column;gap:12px;padding-bottom:20px;}
  .card{
    background:var(--cream);color:var(--ink);border-radius:14px;
    padding:14px 16px;display:flex;gap:12px;align-items:flex-start;
    position:relative;
  }
  .card.done{opacity:0.55;}
  .check{
    flex-shrink:0;width:26px;height:26px;border-radius:50%;
    border:2px solid var(--green);background:#fff;cursor:pointer;
    display:flex;align-items:center;justify-content:center;
    font-size:14px;color:var(--green);margin-top:2px;
  }
  .card.done .check{background:var(--green);color:#fff;}
  .card-body{flex:1;min-width:0;}
  .card-top{display:flex;align-items:baseline;gap:8px;flex-wrap:wrap;}
  .card-name{font-family:'Inter',sans-serif;font-size:15.5px;}
  .card.done .card-name{text-decoration:line-through;}
  .card-area{font-family:'Inter',sans-serif;font-size:11px;color:var(--green-darker);}
  .card-note{font-size:13px;margin-top:4px;line-height:1.45;color:#3a3a30;}
  .card-meta{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap;}
  .tag{font-family:'Inter',sans-serif;font-size:10.5px;background:var(--yellow);color:var(--ink);padding:2px 8px;border-radius:6px;}
  .card-link-text{font-family:'Inter',sans-serif;font-size:11px;color:var(--red);}
  .card-link-open{font-family:'Inter',sans-serif;font-size:12px;color:var(--red);text-decoration:none;font-weight:400;}
  .editable{outline:none;border-bottom:1px dashed transparent;}
  .editable:hover{border-bottom-color:#c9c4ac;}
  .editable:focus{border-bottom-color:var(--red);}
  .editable:empty:before{content:attr(data-placeholder);color:#a8a494;}
  .del{
    flex-shrink:0;background:none;border:none;color:#b8b4a4;font-size:18px;
    cursor:pointer;line-height:1;padding:2px;
  }
  .del:hover{color:var(--red);}

  .card.highlight{animation:cardFlash 1.4s ease;}
  @keyframes cardFlash{
    0%{box-shadow:0 0 0 3px var(--yellow);}
    70%{box-shadow:0 0 0 3px var(--yellow);}
    100%{box-shadow:0 0 0 0px transparent;}
  }
  .empty{color:var(--cream);opacity:0.75;font-size:14px;padding:20px 4px;font-family:'Inter',sans-serif;}

  footer{padding:36px 28px 44px;text-align:center;}
  .mapbox{background:var(--cream);border-radius:16px;padding:16px;margin:0 28px 22px;color:var(--ink);}
  .mapbox-title{font-size:20px;margin-bottom:6px;transform:rotate(-1deg);display:inline-block;}
  .mapbox svg{width:100%;height:auto;display:block;}
  .map-legend{font-size:10.5px;color:#5a5a4c;margin-top:6px;font-family:'Inter',sans-serif;}
  .map-pin{cursor:default;}
  .map-pin text{font-family:'Inter',sans-serif;font-weight:400;fill:var(--cream);font-size:8px;}
  .map-label{font-family:'Caveat',cursive;font-size:15px;fill:#3a5c2e;}

  .love-note{
    position:relative;width:190px;flex-shrink:0;margin-bottom:-16px;
    background:var(--cream);color:var(--ink);
    padding:16px 16px 16px 28px;
    transform:rotate(-5deg) scale(0.85);
    opacity:0;pointer-events:none;transition:opacity 0.5s ease, transform 0.5s ease;
    box-shadow:0 6px 14px rgba(0,0,0,0.18);z-index:20;
    clip-path:polygon(14% 0%, 100% 0%, 100% 100%, 14% 100%, 0% 50%);
  }
  .love-note.show{opacity:1;transform:rotate(-4deg) scale(1);pointer-events:auto;}
  .love-note-text{font-family:'Caveat',cursive;font-weight:700;font-size:15px;line-height:1.25;}
  .love-note-text.kaomoji{font-family:Arial,Helvetica,sans-serif;font-weight:400;font-size:26px;text-align:center;line-height:1.4;}
  .love-note-hole{position:absolute;left:16px;top:50%;margin-top:-4px;width:8px;height:8px;border-radius:50%;background:var(--green);}
  .love-note-string{position:absolute;top:-22px;left:56px;overflow:visible;pointer-events:none;}
  .top-band{position:relative;}
  .corner-stack{
    position:absolute;right:20px;bottom:14px;
    display:flex;flex-direction:column;align-items:flex-end;
    z-index:19;
  }
  .couple-wrap{
    transform:rotate(4deg);
    width:105px;
  }
  .couple-wrap .couple-photo{
    position:static;display:block;width:100%;height:auto;
    filter:drop-shadow(0 6px 10px rgba(0,0,0,0.35));
  }
  .couple-tag{
    position:absolute;left:50%;bottom:-16px;transform:translateX(-50%);
    width:150%;height:auto;overflow:visible;pointer-events:none;
  }
  .couple-tag text{
    font-family:'Inter',sans-serif;font-weight:400;fill:var(--yellow);
    paint-order:stroke fill;stroke:#1C3542;stroke-width:1px;
  }
  @media (max-width:600px){
    .corner-stack{right:14px;bottom:14px;}
    .couple-wrap{width:75px;}
    .love-note{width:128px;padding:11px 11px 11px 18px;font-size:11.5px;}
    .love-note-string{left:38px;top:-16px;width:44px;height:20px;}
    .love-note-hole{left:12px;width:6px;height:6px;}
  }
  .love-note-close{position:absolute;top:2px;right:6px;border:none;background:none;color:#9a9686;font-size:13px;cursor:pointer;}
  .foot-sub{font-size:11px;color:var(--cream);opacity:0.7;margin-top:6px;font-family:'Inter',sans-serif;}

  @media (max-width:480px){
    .hero-title{font-size:84px;}
    .addbar-grid{grid-template-columns:1fr;}
  }
</style>
</head>
<body>
<div class="wrap">

  <div class="top-band">
  <header>
    <h1 class="hero-title marker" id="titleEdit" spellcheck="false">tokyo</h1>
    <p class="hero-sub" id="subEdit" spellcheck="false">itinerary · wakaba &amp; <b>dom</b> · september 2026</p>

    <div class="countdown-row">
      <div class="countdown-pill">
        <span spellcheck="false" id="landsLabel">dom lands</span>

      <span class="countdown-num marker" id="countdownNum">-- days</span>

    <div id="saveStatus" style="font-size:11px;opacity:0.75;margin-top:2px;"></div>

<script>
const CATS = [
  {id:'food', label:'food'},
  {id:'bars', label:'bars'},
  {id:'sights', label:'sights'},
  {id:'daytrips', label:'day trips'},
  {id:'shopping', label:'shopping'},
  {id:'misc', label:'misc'}
];

const CAT_META = {
  food:{mono:'F', color:'#B5583F'},
  bars:{mono:'B', color:'#B3C9ED'},
  sights:{mono:'S', color:'#EEEA99'},
  daytrips:{mono:'D', color:'#457C97'},
  shopping:{mono:'SH', color:'#D5E6C8'},
  misc:{mono:'M', color:'#7C93A0'}
};

const NEIGHBORHOODS = {
  'shinjuku':{x:150,y:120},
  'shibuya':{x:175,y:270},
  'harajuku':{x:205,y:200},
  'omotesando':{x:205,y:200},
  'shimokita':{x:80,y:230},
  'nakameguro':{x:150,y:330},
  'daikanyama':{x:160,y:310},
  'roppongi':{x:260,y:320},
  'ginza':{x:330,y:300},
  'marunouchi':{x:320,y:280},
  'tokyo station':{x:320,y:280},
  'akihabara':{x:390,y:210},
  'ueno':{x:400,y:150},
  'yanaka':{x:410,y:130},
  'asakusa':{x:440,y:190},
  'ikebukuro':{x:190,y:90},
  'kichijoji':{x:60,y:170},
  'koenji':{x:100,y:190},
  'odaiba':{x:420,y:400},
  'meguro':{x:170,y:320},
  'ebisu':{x:190,y:290}
};
const MISC_SPOT = {x:600,y:100};

function hashStr(s){
  let h = 0;
  for(let i=0;i<s.length;i++){ h = (h*31 + s.charCodeAt(i)) | 0; }
  return h;
}

function findMapCoord(area){
  if(!area) return null;
  const a = area.toLowerCase();
  for(const key in NEIGHBORHOODS){
    if(a.includes(key)) return NEIGHBORHOODS[key];
  }
  return null;
}

let state = {
  title: null,
  sub: null,
  landsLabel: null,
  footMark: null,
  footSub: null,
  tripDate: '2026-09-01',
  active: 'food',
  items: { food:[], bars:[], sights:[], daytrips:[], shopping:[], misc:[] }
};

const STORAGE_KEY = 'tokyo-itinerary-state';

function setStatus(msg, isError){
  const el = document.getElementById('saveStatus');
  if(!el) return;
  el.textContent = msg;
  el.style.color = isError ? '#FFD1CC' : 'var(--cream)';
}

async function loadState(){
  try{
    const res = await fetch('/api/state');
    if(res.ok){
      const data = await res.json();
      if(data && data.value){
        const parsed = data.value;
        const mergedItems = Object.assign({}, state.items, parsed.items || {});
        state = Object.assign(state, parsed);
        state.items = mergedItems;
        CATS.forEach(c=>{ if(!Array.isArray(state.items[c.id])) state.items[c.id] = []; });
        CATS.forEach(c=>{
          state.items[c.id].forEach(it=>{
            if(!it.id) it.id = Date.now() + '-' + Math.random().toString(36).slice(2,8);
          });
        });
        setStatus('loaded your saved list');
      } else {
        setStatus('no saved list yet — start adding spots');
      }
    } else {
      setStatus('no saved list yet — start adding spots');
    }
  }catch(e){
    setStatus('could not reach server — changes will not be saved', true);
  }
  applyLoadedText();
  document.getElementById('tripDate').value = state.tripDate;
  renderTabs();
  renderCards();
  renderMap();
  updateCountdown();
  maybeShowLoveNote();
}

let saveTimer = null;
async function saveState(){
  setStatus('saving…');
  try{
    const res = await fetch('/api/state', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(state)
    });
    if(res.ok){
      setStatus('saved ✓');
    } else {
      setStatus('save failed — try again', true);
    }
  }catch(e){
    setStatus('save failed: ' + (e && e.message ? e.message : 'unknown error'), true);
  }
}

function applyLoadedText(){
  // title / subtitle / lands-label / footer tagline are fixed in the HTML now —

function renderMap(){
  const pinsGroup = document.getElementById('mapPins');
  if(!pinsGroup) return;
  pinsGroup.innerHTML = '';
  let miscCount = 0;
  CATS.forEach(cat=>{
    (state.items[cat.id] || []).forEach(item=>{
      let coord = findMapCoord(item.area);
      let jx = 0, jy = 0;
      if(!coord){
        coord = MISC_SPOT;
        jx = (miscCount % 4) * 16;
        jy = Math.floor(miscCount / 4) * 16;
        miscCount++;
      } else {
        const h = hashStr(item.name + cat.id);
        jx = (h % 24) - 12;
        jy = ((h >> 3) % 24) - 12;
      }
      const meta = CAT_META[cat.id] || CAT_META.misc;
      const g = document.createElementNS('http://www.w3.org/2000/svg','g');
      g.setAttribute('class','map-pin');
      g.setAttribute('transform', 'translate(' + (coord.x + jx) + ',' + (coord.y + jy) + ')');
      g.style.cursor = 'pointer';
      g.addEventListener('click', ()=>{ jumpToItem(cat.id, item.id); });
      const circle = document.createElementNS('http://www.w3.org/2000/svg','circle');
      circle.setAttribute('r','10');
      circle.setAttribute('fill', meta.color);
      circle.setAttribute('stroke', '#1C3542');
      circle.setAttribute('stroke-width','1.5');
      g.appendChild(circle);
      const text = document.createElementNS('http://www.w3.org/2000/svg','text');
      text.setAttribute('text-anchor','middle');
      text.setAttribute('dy','3');
      text.textContent = meta.mono;
      g.appendChild(text);
      const title = document.createElementNS('http://www.w3.org/2000/svg','title');
      title.textContent = item.name + (item.area ? ' — ' + item.area : '');
      g.appendChild(title);
      pinsGroup.appendChild(g);
    });
  });
  const legend = document.getElementById('mapLegend');
  if(legend){
    legend.innerHTML = CATS.map(c=>{
      const m = CAT_META[c.id];
      return '<span style="color:'+m.color+'; font-weight:400;">'+m.mono+'</span> '+c.label;
    }).join(' &nbsp;·&nbsp; ');
  }
}

function jumpToItem(catId, itemId){
  state.active = catId;
  renderTabs();
  renderCards();
  saveState();
  setTimeout(()=>{
    const card = document.querySelector('.card[data-id="'+itemId+'"]');
    if(card){
      card.scrollIntoView({behavior:'smooth', block:'center'});
      card.classList.add('highlight');
      setTimeout(()=>{ card.classList.remove('highlight'); }, 1500);
    }
  }, 50);
}

function renderTabs(){
  const nav = document.getElementById('tabs');
  nav.innerHTML = '';
  CATS.forEach(c=>{
    const btn = document.createElement('button');
    btn.className = 'tab' + (state.active===c.id ? ' active':'');
    btn.innerHTML = c.label + ' <span class="count">'+state.items[c.id].length+'</span>';
    btn.onclick = ()=>{ state.active = c.id; renderTabs(); renderCards(); };
    nav.appendChild(btn);
  });
}

function renderCards(){
  const list = document.getElementById('cardList');
  list.innerHTML = '';
  const items = state.items[state.active];
  if(items.length === 0){
    const empty = document.createElement('div');
    empty.className = 'empty';
    empty.textContent = 'nothing here yet — add your first spot above';
    list.appendChild(empty);
    return;
  }
  items.forEach((item, idx)=>{
    const card = document.createElement('div');
    card.className = 'card' + (item.done ? ' done':'');
    card.dataset.id = item.id || '';

    const check = document.createElement('div');
    check.className = 'check';
    check.innerHTML = item.done ? '✓' : '';
    check.onclick = ()=>{ item.done = !item.done; saveState(); renderCards(); };
    card.appendChild(check);

    const body = document.createElement('div');
    body.className = 'card-body';

    const top = document.createElement('div');
    top.className = 'card-top';

    const name = document.createElement('span');
    name.className = 'card-name editable';
    name.contentEditable = 'true';
    name.spellcheck = false;
    name.textContent = item.name;
    name.addEventListener('blur', ()=>{
      const val = name.textContent.trim();
      if(!val){ name.textContent = item.name; return; }
      item.name = val;
      saveState(); renderMap();
    });
    top.appendChild(name);

    const area = document.createElement('span');
    area.className = 'card-area editable';
    area.contentEditable = 'true';
    area.spellcheck = false;
    area.dataset.placeholder = '+ area';
    area.textContent = item.area || '';
    area.addEventListener('blur', ()=>{
      item.area = area.textContent.trim();
      saveState(); renderMap();
    });
    top.appendChild(area);

    body.appendChild(top);

    const note = document.createElement('div');
    note.className = 'card-note editable';
    note.contentEditable = 'true';
    note.spellcheck = false;
    note.dataset.placeholder = '+ add a note';
    note.textContent = item.note || '';
    note.addEventListener('blur', ()=>{
      item.note = note.textContent.trim();
      saveState();
    });
    body.appendChild(note);

    const meta = document.createElement('div');
    meta.className = 'card-meta';

    const tag = document.createElement('span');
    tag.className = 'tag editable';
    tag.contentEditable = 'true';
    tag.spellcheck = false;
    tag.dataset.placeholder = '+ day';
    tag.textContent = item.day || '';
    tag.addEventListener('blur', ()=>{
      item.day = tag.textContent.trim();
      saveState();
    });
    meta.appendChild(tag);

    const linkText = document.createElement('span');
    linkText.className = 'card-link-text editable';
    linkText.contentEditable = 'true';
    linkText.spellcheck = false;
    linkText.dataset.placeholder = '+ link';
    linkText.textContent = item.link || '';
    meta.appendChild(linkText);

    const linkOpen = document.createElement('a');
    linkOpen.className = 'card-link-open';
    linkOpen.target = '_blank';
    linkOpen.rel = 'noopener';
    linkOpen.textContent = '↗';
    linkOpen.style.display = item.link ? 'inline' : 'none';
    if(item.link) linkOpen.href = item.link.startsWith('http') ? item.link : 'https://'+item.link;
    meta.appendChild(linkOpen);

    linkText.addEventListener('blur', ()=>{
      const val = linkText.textContent.trim();
      item.link = val;
      if(val){
        linkOpen.href = val.startsWith('http') ? val : 'https://'+val;
        linkOpen.style.display = 'inline';
      } else {
        linkOpen.style.display = 'none';
      }
      saveState();
    });

    body.appendChild(meta);

    card.appendChild(body);

    const del = document.createElement('button');
    del.className = 'del';
    del.innerHTML = '&times;';
    del.onclick = ()=>{
      state.items[state.active].splice(idx,1);
      saveState(); renderTabs(); renderCards(); renderMap();
    };
    card.appendChild(del);


    list.appendChild(card);
  });
}

function addItem(){
  const name = document.getElementById('f-name').value.trim();
  if(!name) return;
  const item = {
    id: Date.now() + '-' + Math.random().toString(36).slice(2,8),
    name,
    area: document.getElementById('f-area').value.trim(),
    link: document.getElementById('f-link').value.trim(),
    day: document.getElementById('f-day').value.trim(),
    note: document.getElementById('f-note').value.trim(),
    done: false
  };
  state.items[state.active].push(item);
  ['f-name','f-area','f-link','f-day','f-note'].forEach(id=>document.getElementById(id).value='');
  saveState();
  renderTabs();
  renderCards();
  renderMap();
}

function updateCountdown(){
  const dateStr = document.getElementById('tripDate').value;
  state.tripDate = dateStr;
  const target = new Date(dateStr + 'T00:00:00');
  const now = new Date();
  const diffDays = Math.ceil((target - now) / (1000*60*60*24));
  const el = document.getElementById('countdownNum');
  if(diffDays > 0) el.textContent = diffDays + ' days';
  else if(diffDays === 0) el.textContent = 'today!!';
  else el.textContent = 'he is here';
}

document.getElementById('addBtn').addEventListener('click', addItem);
document.getElementById('f-note').addEventListener('keydown', e=>{
  if(e.key==='Enter' && e.metaKey) addItem();
});
document.getElementById('f-day').addEventListener('keydown', e=>{
  if(e.key==='Enter') addItem();
});
document.getElementById('tripDate').addEventListener('change', ()=>{ updateCountdown(); saveState(); });

function maybeShowLoveNote(){
  const note = document.getElementById('loveNote');
  const textEl = document.getElementById('loveNoteText');
  if(!note || !textEl) return;
  const msg = LOVE_NOTES[Math.floor(Math.random()*LOVE_NOTES.length)];
  textEl.textContent = msg;
  textEl.classList.toggle('kaomoji', /[^\x00-\x7F]/.test(msg));
  setTimeout(()=>{ note.classList.add('show'); }, 1600);
}

document.getElementById('loveNoteClose').addEventListener('click', ()=>{
  document.getElementById('loveNote').classList.remove('show');
});

loadState();
